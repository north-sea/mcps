name: MCP Release

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: mcp-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release target
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.resolve.outputs.service }}
      version: ${{ steps.resolve.outputs.version }}
      image: ${{ steps.resolve.outputs.image }}
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      context: ${{ steps.resolve.outputs.context }}
      dockerfile: ${{ steps.resolve.outputs.dockerfile }}
      platforms: ${{ steps.resolve.outputs.platforms }}
      test_working_directory: ${{ steps.resolve.outputs.test_working_directory }}
      test_command: ${{ steps.resolve.outputs.test_command }}
      compose_project_dir: ${{ steps.resolve.outputs.compose_project_dir }}
      compose_file: ${{ steps.resolve.outputs.compose_file }}
      compose_service: ${{ steps.resolve.outputs.compose_service }}
      container_name: ${{ steps.resolve.outputs.container_name }}
      migration_entrypoint: ${{ steps.resolve.outputs.migration_entrypoint }}
      migration_command: ${{ steps.resolve.outputs.migration_command }}
      smoke_url: ${{ steps.resolve.outputs.smoke_url }}
      smoke_token_env: ${{ steps.resolve.outputs.smoke_token_env }}
      smoke_capabilities: ${{ steps.resolve.outputs.smoke_capabilities }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve service from tag
        id: resolve
        run: node scripts/resolve-mcp-release.mjs "${GITHUB_REF_NAME}"

  test:
    name: Test ${{ needs.resolve.outputs.service }}
    needs: resolve
    runs-on: ubuntu-latest
    if: needs.resolve.outputs.test_command != ''
    defaults:
      run:
        working-directory: ${{ needs.resolve.outputs.test_working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run service tests
        run: ${{ needs.resolve.outputs.test_command }}

  preflight_github:
    name: Preflight Git tag and GHCR image
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Git tag is present
        run: |
          set -euo pipefail
          git show-ref --tags --verify "refs/tags/${GITHUB_REF_NAME}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Refuse existing GHCR version tag
        env:
          IMAGE_REF: ${{ needs.resolve.outputs.image_ref }}
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "Image already exists: ${IMAGE_REF}" >&2
            exit 1
          fi

      - name: Release summary
        env:
          SERVICE_NAME: ${{ needs.resolve.outputs.service }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE_REF: ${{ needs.resolve.outputs.image_ref }}
          MIGRATION_COMMAND: ${{ needs.resolve.outputs.migration_command }}
          SMOKE_URL: ${{ needs.resolve.outputs.smoke_url }}
          SMOKE_CAPABILITIES: ${{ needs.resolve.outputs.smoke_capabilities }}
        run: |
          {
            echo "## MCP release preflight"
            echo
            echo "- Git tag: ${GITHUB_REF_NAME}"
            echo "- Service: ${SERVICE_NAME}"
            echo "- Version: ${VERSION}"
            echo "- Image: ${IMAGE_REF}"
            echo "- Migration: ${MIGRATION_COMMAND:-none}"
            echo "- Smoke URL: ${SMOKE_URL:-none}"
            echo "- Required capabilities: ${SMOKE_CAPABILITIES:-none}"
          } >> "${GITHUB_STEP_SUMMARY}"

  preflight_nas:
    name: Preflight NAS deploy target
    needs: resolve
    runs-on:
      - self-hosted
      - nas
      - deploy
    steps:
      - name: Check compose, env, and migration role
        env:
          SERVICE_NAME: ${{ needs.resolve.outputs.service }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE_REF: ${{ needs.resolve.outputs.image_ref }}
          COMPOSE_PROJECT_DIR: ${{ needs.resolve.outputs.compose_project_dir }}
          COMPOSE_FILE: ${{ needs.resolve.outputs.compose_file }}
          COMPOSE_SERVICE: ${{ needs.resolve.outputs.compose_service }}
          CONTAINER_NAME: ${{ needs.resolve.outputs.container_name }}
          MIGRATION_COMMAND: ${{ needs.resolve.outputs.migration_command }}
          SMOKE_TOKEN_ENV: ${{ needs.resolve.outputs.smoke_token_env }}
        run: |
          set -euo pipefail

          required_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required env: ${name}" >&2
              exit 2
            fi
          }

          required_env SERVICE_NAME
          required_env IMAGE_REF
          required_env COMPOSE_PROJECT_DIR
          required_env COMPOSE_FILE
          required_env COMPOSE_SERVICE
          required_env CONTAINER_NAME

          migration_command="${MIGRATION_COMMAND:-}"
          smoke_token_env="${SMOKE_TOKEN_ENV:-}"

          cd "${COMPOSE_PROJECT_DIR}"

          if [[ ! -f "${COMPOSE_FILE}" ]]; then
            echo "Compose file not found: ${COMPOSE_PROJECT_DIR}/${COMPOSE_FILE}" >&2
            exit 1
          fi

          override_file="$(mktemp)"
          compose_config_json="$(mktemp)"
          trap 'rm -f "${override_file}" "${compose_config_json}"' EXIT
          printf 'services:\n  %s:\n    image: %s\n' "${COMPOSE_SERVICE}" "${IMAGE_REF}" > "${override_file}"
          docker compose -f "${COMPOSE_FILE}" -f "${override_file}" config --format json > "${compose_config_json}"

          python3 - "${compose_config_json}" "${COMPOSE_SERVICE}" "${IMAGE_REF}" <<'PY'
          import json
          import sys

          path, service_name, image_ref = sys.argv[1:4]
          with open(path, "r", encoding="utf-8") as fh:
              config = json.load(fh)
          service = config.get("services", {}).get(service_name)
          if not service:
              raise SystemExit(f"Compose service not found after config: {service_name}")
          actual_image = service.get("image")
          if actual_image != image_ref:
              raise SystemExit(f"Compose image mismatch: {actual_image} != {image_ref}")
          print(f"image: {actual_image}")
          PY

          required_env_keys=("PG_DSN")
          if [[ -n "${smoke_token_env}" ]]; then
            required_env_keys+=("${smoke_token_env}")
          fi
          if [[ -n "${migration_command}" ]]; then
            required_env_keys+=("MIGRATION_PG_DSN")
          fi

          python3 - "${compose_config_json}" "${COMPOSE_SERVICE}" "${required_env_keys[@]}" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          service_name = sys.argv[2]
          required = sys.argv[3:]
          with open(path, "r", encoding="utf-8") as fh:
              config = json.load(fh)
          service = config.get("services", {}).get(service_name, {})
          environment = service.get("environment") or {}
          if isinstance(environment, list):
              present = {item.split("=", 1)[0] for item in environment if "=" in item}
          elif isinstance(environment, dict):
              present = set(environment)
          else:
              present = set()
          missing = [key for key in required if key not in present]
          if missing:
              raise SystemExit(f"Missing required env keys: {' '.join(missing)}")
          PY

          migration_role_summary="not checked"
          if [[ -n "${migration_command}" ]] && docker inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
            migration_role_summary="$(docker exec -i "${CONTAINER_NAME}" python - <<'PY'
          import os
          import psycopg2

          dsn = os.environ.get("MIGRATION_PG_DSN")
          if not dsn:
              raise SystemExit("MIGRATION_PG_DSN is not present in the running container")
          conn = psycopg2.connect(dsn)
          cur = conn.cursor()
          cur.execute("select current_user")
          current_user = cur.fetchone()[0]
          cur.execute(
              "select tableowner from pg_tables where schemaname=%s and tablename=%s",
              ("hermes", "topics"),
          )
          owner_row = cur.fetchone()
          table_owner = owner_row[0] if owner_row else "missing"
          cur.execute("select rolsuper from pg_roles where rolname = current_user")
          is_superuser = bool(cur.fetchone()[0])
          cur.close()
          conn.close()
          print(f"current_user={current_user}; hermes.topics owner={table_owner}; superuser={is_superuser}")
          if table_owner != "missing" and current_user != table_owner and not is_superuser:
              raise SystemExit("Migration role is neither hermes.topics owner nor superuser")
          PY
            )"
          fi

          {
            echo "## NAS deploy preflight"
            echo
            echo "- Service: ${SERVICE_NAME}"
            echo "- Target image: ${IMAGE_REF}"
            echo "- Compose project: ${COMPOSE_PROJECT_DIR}"
            echo "- Compose file: ${COMPOSE_FILE}"
            echo "- Compose service: ${COMPOSE_SERVICE}"
            echo "- Container: ${CONTAINER_NAME}"
            echo "- Required env keys present: ${required_env_keys[*]}"
            echo "- Migration role: ${migration_role_summary}"
          } | tee /tmp/mcp-release-preflight-summary.md

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            cat /tmp/mcp-release-preflight-summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

  build:
    name: Build and publish ${{ needs.resolve.outputs.image_ref }}
    needs:
      - resolve
      - test
      - preflight_github
      - preflight_nas
    if: ${{ always() && needs.resolve.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.preflight_github.result == 'success' && needs.preflight_nas.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Refuse to overwrite existing version image
        env:
          IMAGE_REF: ${{ needs.resolve.outputs.image_ref }}
        run: |
          if docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "Image already exists: ${IMAGE_REF}" >&2
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.resolve.outputs.context }}
          file: ${{ needs.resolve.outputs.dockerfile }}
          platforms: ${{ needs.resolve.outputs.platforms }}
          push: true
          tags: ${{ needs.resolve.outputs.image_ref }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}

  deploy:
    name: Deploy ${{ needs.resolve.outputs.service }} to NAS
    needs:
      - resolve
      - build
    runs-on:
      - self-hosted
      - nas
      - deploy
    steps:
      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_PASSWORD}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

      - name: Deploy exact version
        env:
          SERVICE_NAME: ${{ needs.resolve.outputs.service }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE: ${{ needs.resolve.outputs.image }}
          COMPOSE_PROJECT_DIR: ${{ needs.resolve.outputs.compose_project_dir }}
          COMPOSE_FILE: ${{ needs.resolve.outputs.compose_file }}
          COMPOSE_SERVICE: ${{ needs.resolve.outputs.compose_service }}
          CONTAINER_NAME: ${{ needs.resolve.outputs.container_name }}
          MIGRATION_ENTRYPOINT: ${{ needs.resolve.outputs.migration_entrypoint }}
          MIGRATION_COMMAND: ${{ needs.resolve.outputs.migration_command }}
          SMOKE_URL: ${{ needs.resolve.outputs.smoke_url }}
          SMOKE_TOKEN_ENV: ${{ needs.resolve.outputs.smoke_token_env }}
          SMOKE_CAPABILITIES: ${{ needs.resolve.outputs.smoke_capabilities }}
        run: |
          set -euo pipefail

          image_ref="${IMAGE}:${VERSION}"
          override_file=".mcps-release.override.yml"
          migration_entrypoint="${MIGRATION_ENTRYPOINT:-}"
          migration_command="${MIGRATION_COMMAND:-}"
          smoke_url="${SMOKE_URL:-}"
          smoke_token_env="${SMOKE_TOKEN_ENV:-}"
          smoke_capabilities="${SMOKE_CAPABILITIES:-}"

          cd "${COMPOSE_PROJECT_DIR}"

          if [[ ! -f "${COMPOSE_FILE}" ]]; then
            echo "Compose file not found: ${COMPOSE_PROJECT_DIR}/${COMPOSE_FILE}" >&2
            exit 1
          fi

          printf 'services:\n  %s:\n    image: %s\n' "${COMPOSE_SERVICE}" "${image_ref}" > "${override_file}"
          docker compose -f "${COMPOSE_FILE}" -f "${override_file}" config | grep -F "image: ${image_ref}"

          echo "Deploying ${SERVICE_NAME} ${VERSION} from ${image_ref}"
          docker compose -f "${COMPOSE_FILE}" -f "${override_file}" pull "${COMPOSE_SERVICE}"

          if [[ -n "${migration_command}" ]]; then
            echo "Running release migration: ${migration_command}"
            if [[ -n "${migration_entrypoint}" ]]; then
              docker compose -f "${COMPOSE_FILE}" -f "${override_file}" run --rm --entrypoint "${migration_entrypoint}" "${COMPOSE_SERVICE}" ${migration_command}
            else
              docker compose -f "${COMPOSE_FILE}" -f "${override_file}" run --rm "${COMPOSE_SERVICE}" ${migration_command}
            fi
          fi

          docker compose -f "${COMPOSE_FILE}" -f "${override_file}" up -d "${COMPOSE_SERVICE}"

          running="$(docker inspect "${CONTAINER_NAME}" --format '{{.State.Running}}')"
          actual_image="$(docker inspect "${CONTAINER_NAME}" --format '{{.Config.Image}}')"

          if [[ "${running}" != "true" ]]; then
            echo "Container ${CONTAINER_NAME} is not running after deploy" >&2
            docker logs --tail 120 "${CONTAINER_NAME}" >&2 || true
            exit 1
          fi

          if [[ "${actual_image}" != "${image_ref}" ]]; then
            echo "Container ${CONTAINER_NAME} is running unexpected image: ${actual_image}" >&2
            echo "Expected: ${image_ref}" >&2
            exit 1
          fi

          if [[ -n "${smoke_url}" ]]; then
            token=""
            if [[ -n "${smoke_token_env}" ]]; then
              token="${!smoke_token_env:-}"
              if [[ -z "${token}" ]]; then
                token="$(docker inspect "${CONTAINER_NAME}" --format "{{range .Config.Env}}{{println .}}{{end}}" | sed -n "s/^${smoke_token_env}=//p" | head -n 1)"
              fi
              if [[ -z "${token}" ]]; then
                echo "Smoke token env var is empty: ${smoke_token_env}" >&2
                exit 1
              fi
            fi

            echo "Running MCP health smoke: ${smoke_url}"
            python3 - "$smoke_url" "$token" "$smoke_capabilities" <<'PY'
          import json
          import time
          import sys
          import urllib.request
          from urllib.error import URLError

          url, token, capabilities = sys.argv[1:4]
          required = [item for item in capabilities.split(",") if item]
          headers = {
              "Accept": "application/json, text/event-stream",
              "Content-Type": "application/json",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          payload = {
              "jsonrpc": "2.0",
              "id": 1,
              "method": "tools/call",
              "params": {
                  "name": "health",
                  "arguments": {},
              },
          }
          request = urllib.request.Request(
              url,
              data=json.dumps(payload).encode("utf-8"),
              headers=headers,
              method="POST",
          )

          last_error = None
          for attempt in range(1, 11):
              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      raw = response.read().decode("utf-8")
                  break
              except (ConnectionError, TimeoutError, URLError, OSError) as exc:
                  last_error = exc
                  if attempt == 10:
                      raise
                  time.sleep(min(attempt, 5))
          else:
              raise SystemExit(f"MCP health smoke failed: {last_error}")

          data = json.loads(raw)
          if "error" in data:
              raise SystemExit(f"MCP health returned error: {data['error']}")

          content = data.get("result", {}).get("content", [])
          structured = data.get("result", {}).get("structuredContent")
          if isinstance(structured, dict):
              health = structured
          else:
              if not content:
                  raise SystemExit(f"MCP health response missing content: {data}")
              text = content[0].get("text")
              if text is None:
                  raise SystemExit(f"MCP health response missing text content: {data}")
              health = json.loads(text)
          if health.get("pg") != "ok":
              raise SystemExit(f"PostgreSQL health is not ok: {health.get('pg')}")

          capability_map = health.get("capabilities") or {}
          missing = [name for name in required if capability_map.get(name) is not True]
          if missing:
              raise SystemExit(f"Missing capabilities after deploy: {missing}; health={health}")

          print(json.dumps({
              "version": health.get("version"),
              "schema_revision": health.get("schema_revision"),
              "capabilities": capability_map,
          }, ensure_ascii=False))
          PY
          fi

          echo "Deployment complete: ${CONTAINER_NAME} -> ${actual_image}"
