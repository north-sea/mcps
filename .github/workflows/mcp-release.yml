name: MCP Release

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: mcp-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release target
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.resolve.outputs.service }}
      version: ${{ steps.resolve.outputs.version }}
      image: ${{ steps.resolve.outputs.image }}
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      context: ${{ steps.resolve.outputs.context }}
      dockerfile: ${{ steps.resolve.outputs.dockerfile }}
      platforms: ${{ steps.resolve.outputs.platforms }}
      test_working_directory: ${{ steps.resolve.outputs.test_working_directory }}
      test_command: ${{ steps.resolve.outputs.test_command }}
      compose_project_dir: ${{ steps.resolve.outputs.compose_project_dir }}
      compose_file: ${{ steps.resolve.outputs.compose_file }}
      compose_service: ${{ steps.resolve.outputs.compose_service }}
      container_name: ${{ steps.resolve.outputs.container_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve service from tag
        id: resolve
        run: node scripts/resolve-mcp-release.mjs "${GITHUB_REF_NAME}"

  test:
    name: Test ${{ needs.resolve.outputs.service }}
    needs: resolve
    runs-on: ubuntu-latest
    if: needs.resolve.outputs.test_command != ''
    defaults:
      run:
        working-directory: ${{ needs.resolve.outputs.test_working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run service tests
        run: ${{ needs.resolve.outputs.test_command }}

  build:
    name: Build and publish ${{ needs.resolve.outputs.image_ref }}
    needs:
      - resolve
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Refuse to overwrite existing version image
        env:
          IMAGE_REF: ${{ needs.resolve.outputs.image_ref }}
        run: |
          if docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "Image already exists: ${IMAGE_REF}" >&2
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.resolve.outputs.context }}
          file: ${{ needs.resolve.outputs.dockerfile }}
          platforms: ${{ needs.resolve.outputs.platforms }}
          push: true
          tags: ${{ needs.resolve.outputs.image_ref }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}

  deploy:
    name: Deploy ${{ needs.resolve.outputs.service }} to NAS
    needs:
      - resolve
      - build
    runs-on:
      - self-hosted
      - nas
      - mcps-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy exact version
        env:
          SERVICE_NAME: ${{ needs.resolve.outputs.service }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE: ${{ needs.resolve.outputs.image }}
          COMPOSE_PROJECT_DIR: ${{ needs.resolve.outputs.compose_project_dir }}
          COMPOSE_FILE: ${{ needs.resolve.outputs.compose_file }}
          COMPOSE_SERVICE: ${{ needs.resolve.outputs.compose_service }}
          CONTAINER_NAME: ${{ needs.resolve.outputs.container_name }}
        run: scripts/nas-deploy-mcp.sh
