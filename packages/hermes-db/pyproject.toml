[project]
name = "hermes-db-mcp"
version = "0.2.18"
description = "Hermes 领域级 DB MCP Server - 语义化数据访问工具"
readme = "README.md"
authors = [
    { name = "希有", email = "646388689@qq.com" }
]
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.12",
    "asyncpg>=0.30",
    "redis[hiredis]>=5.0",
    "httpx>=0.27",
    "pydantic-settings>=2.0",
    "pgvector>=0.3",
    "uvicorn>=0.34",
    "starlette>=0.46",
    "alembic>=1.13",
    "psycopg2-binary>=2.9",
]

[project.scripts]
hermes-db-mcp = "hermes_db_mcp.server:main"

[build-system]
requires = ["uv_build>=0.8.5,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
    "ruff>=0.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
